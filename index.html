<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plant Detector / AI 植物檢測器</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f4f9f4;
        }
        h2 { color: #2e7d32; }
        .bilingual-text { font-size: 0.9em; color: #555; display: block; margin-top: 5px;}
        
        .controls { margin-bottom: 20px; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
            color: white;
            transition: 0.3s;
            line-height: 1.4;
        }
        #btn-start { background-color: #1976d2; }
        #btn-start:hover { background-color: #1565c0; }
        
        #btn-capture { background-color: #388e3c; display: none; }
        #btn-capture:hover { background-color: #2e7d32; }

        #btn-upload { background-color: #f57c00; }
        #btn-upload:hover { background-color: #e65100; }

        #webcam-container { 
            margin: 20px auto; 
            border: 4px solid #4caf50; 
            border-radius: 10px;
            display: inline-block; 
            overflow: hidden;
            background-color: #000;
            width: 300px;
            height: 300px;
        }
        
        /* Pop-up Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 10; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: #fff; margin: 15% auto; padding: 30px;
            border-radius: 12px; width: 450px; max-width: 90%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: left;
        }
        .close-btn { 
            color: #aaa; float: right; font-size: 28px; 
            font-weight: bold; cursor: pointer; margin-top: -10px;
        }
        .close-btn:hover { color: #333; }
        #modal-title { color: #2e7d32; margin-top: 0; }
        #modal-image { max-width: 100%; border-radius: 8px; margin-top: 15px; display: none; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #388e3c;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 10px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>🌱 Smart Plant Detector<br><span style="font-size: 0.8em; color: #4caf50;">智能植物檢測器</span></h2>
    <p>Use your local AI or Big Data to identify plants!<br>
       <span class="bilingual-text">使用已訓練AI或線上搜尋識別植物！</span>
    </p>
    
    <div class="controls">
        <button id="btn-start" type="button" onclick="init()">
            1. Start Camera<br><span style="font-size: 0.8em;">開啟相機</span>
        </button>
        <button id="btn-capture" type="button" onclick="captureAndIdentify()">
            2. Take Photo & Identify<br><span style="font-size: 0.8em;">拍照並識別</span>
        </button>
        <button id="btn-upload" type="button" onclick="document.getElementById('image-upload').click()">
            3. Upload from Album<br><span style="font-size: 0.8em;">從相簿上傳</span>
        </button>
        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
    </div>

    <div id="webcam-container"></div>

    <!-- Pop-up Window -->
    <div id="plantModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Identifying... / 識別中...</h3>
            <div id="loading-spinner" class="loader"></div>
            <p id="modal-desc"></p>
            <img id="modal-image" src="" alt="Captured Plant">
        </div>
    </div>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // Your Teachable Machine Model URL
        const URL = "https://teachablemachine.withgoogle.com/models/M03FEtg0X/";

        let model, webcam, maxPredictions;

        // 1. Load the model and setup the webcam
        async function init() {
            document.getElementById("btn-start").innerHTML = "Loading Model...<br><span style='font-size: 0.8em;'>載入模型中...</span>";
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); // request access to the webcam
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Append webcam to DOM
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // Update UI
            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-capture").style.display = "inline-block";
        }

        // Keep updating the webcam frame, but DON'T predict automatically
        function loop() {
            webcam.update(); 
            window.requestAnimationFrame(loop);
        }

        // 2. Take a photo and run detection
        async function captureAndIdentify() {
            // Show modal in "Loading" state
            showModal("Analyzing Photo...<br><span style='font-size: 0.7em; color:#666;'>分析照片中...</span>", "", true);

            // Capture the current frame as an image for the modal
            const imageData = webcam.canvas.toDataURL('image/jpeg');
            document.getElementById("modal-image").src = imageData;
            document.getElementById("modal-image").style.display = "block";

            runPrediction(webcam.canvas);
        }

        // Handle Image Upload from Album
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Ensure model is loaded first since users might click upload before clicking "Start Camera"
            if (!model) {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
            }

            // Show modal in "Loading" state
            showModal("Analyzing Photo...<br><span style='font-size: 0.7em; color:#666;'>分析照片中...</span>", "", true);

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgElement = document.createElement("img");
                imgElement.src = e.target.result;
                imgElement.onload = async function() {
                    document.getElementById("modal-image").src = imgElement.src;
                    document.getElementById("modal-image").style.display = "block";
                    runPrediction(imgElement);
                }
            };
            reader.readAsDataURL(file);
            
            // reset input
            event.target.value = "";
        }

        // Common prediction logic
        async function runPrediction(imageSource) {
            // Predict using local ML model
            const prediction = await model.predict(imageSource);
            
            // Find the best single prediction
            let bestMatch = prediction.reduce((prev, current) => 
                (prev.probability > current.probability) ? prev : current
            );

            // Make it easier to check for "background" or "none" classes (case insensitive)
            const matchName = bestMatch.className.toLowerCase();
            const isBackgroundClass = matchName.includes("background") || 
                                      matchName.includes("none") || 
                                      matchName.includes("背景") || 
                                      matchName.includes("無植物");

            // Thresholds
            const confidenceThreshold = 0.60;

            if (isBackgroundClass) {
                // Explicitly identified as background / none
                updateModal(
                    "No Plant Detected<br><span style='font-size: 0.7em; color:#c62828;'>未偵測到植物</span>", 
                    "<strong>Please take a plant photo.</strong><br><br><span class='bilingual-text'>請拍攝植物照片。</span>"
                );
            } else if (bestMatch.probability < 0.40) {
                // AI is extremely confused (cannot detect clear object)
                updateModal(
                    "Object Not Detected<br><span style='font-size: 0.7em; color:#c62828;'>無法偵測清晰物件</span>", 
                    "<strong>Cannot detect the plant or object clearly. Please take a plant photo.</strong><br><br><span class='bilingual-text'>無法清晰偵測到植物或物件。請拍攝植物照片。</span>"
                );
            } else if (bestMatch.probability > confidenceThreshold) {
                // Is a plant AND knows exactly which one (Local ML Success)
                const confidencePct = (bestMatch.probability * 100).toFixed(1);
                updateModal(
                    "Identified Locally!<br><span style='font-size: 0.7em; color:#666;'>AI識別成功！</span>", 
                    `<strong>Plant Name / 植物名稱:</strong> ${bestMatch.className}<br>
                     <strong>Confidence / 信心水準:</strong> ${confidencePct}%<br><br>
                     <em style="color:#555; font-size:0.9em;">Found using Teachable Machine. / 使用 Teachable Machine 找到。</em>`
                );
            } else {
                // Is a plant, but local AI isn't sure which one -> USE BIG DATA
                // We pass bestMatch to search with the most likely name
                searchBigData(bestMatch.className);
            }
        }

        // 3. Fallback to Big Data Search (Hong Kong Plant Database / Google)
        function searchBigData(plantQuery) {
            updateModal(
                "Local AI Failed<br><span style='font-size: 0.7em; color:#666;'>本地AI識別信心不足</span>", 
                "Searching Hong Kong Plant Database...<br><span class='bilingual-text'>正在搜尋香港植物資料庫及網際網路...</span>", 
                true
            );

            // Clean up the query name (remove English or special characters if you have bilingual classes, e.g. "Rose 玫瑰")
            const queryName = encodeURIComponent(plantQuery.trim());

            // Simulated network request delay before offering the search link
            setTimeout(() => {
                // Create a real search link targeting the HK Herbarium or a general Google search targeting HK plant site
                // We use Google site search on herbarium.gov.hk as their direct search requires form POST
                const hkHerbariumSearchUrl = `https://www.google.com/search?q=${queryName}+site:herbarium.gov.hk`;
                const generalSearchUrl = `https://www.google.com/search?q=${queryName}+植物`;

                updateModal(
                    "Search Big Data / 在線搜尋<br><span style='font-size: 0.7em; color:#1976d2;'>大數據比對</span>", 
                    `<strong>Likely Name / 可能名稱:</strong> ${plantQuery}<br><br>
                     <p>We are not 100% sure. Click below to search online databases:</p>
                     <p class='bilingual-text'>我們無法完全確定。請點擊下方連結於線上資料庫查詢：</p>
                     
                     <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                        <a href="${hkHerbariumSearchUrl}" target="_blank" style="padding: 10px; background-color: #2e7d32; color: white; text-decoration: none; border-radius: 5px; text-align: center;">
                            🔍 Search in HK Plant Database<br>
                            <span style="font-size: 0.8em;">在香港植物資料庫中搜尋</span>
                        </a>
                        
                        <a href="${generalSearchUrl}" target="_blank" style="padding: 10px; background-color: #1976d2; color: white; text-decoration: none; border-radius: 5px; text-align: center;">
                            🌐 General Web Search<br>
                            <span style="font-size: 0.8em;">一般網路搜尋</span>
                        </a>
                     </div>
                     <br>
                     <em style="color:#555; font-size:0.8em;">Redirecting to global Big Data / 導向至全球大數據</em>`
                );
            }, 2000); 
        }

        // --- UI Helper Functions ---

        function showModal(title, text, isLoading = false) {
            document.getElementById("plantModal").style.display = "block";
            updateModal(title, text, isLoading);
        }

        function updateModal(title, text, isLoading = false) {
            document.getElementById("modal-title").innerHTML = title;
            document.getElementById("modal-desc").innerHTML = text;
            
            if (isLoading) {
                document.getElementById("loading-spinner").style.display = "block";
            } else {
                document.getElementById("loading-spinner").style.display = "none";
            }
        }

        function closeModal() {
            document.getElementById("plantModal").style.display = "none";
            document.getElementById("modal-image").style.display = "none";
        }
    </script>
</body>
</html>
